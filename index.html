<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Bangalore Blooms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/proxima-nova-2" rel="stylesheet">
    
    <style>
        /* ========================================
           COLOR PALETTE - Bangalore Blooms
           Updated minimalist design
        ======================================== */
        :root {
            /* Brand Colors */
            --background: #FFFFFF;
            --surface-white: #ffffff;
            --text-title: #252525;
            --text-body: #585757;
            --button-bg: #000000;
            --button-text: #ffffff;
            
            /* Form Colors */
            --border-color: #e0e0e0;
            --error-color: #d14545;
            --success-color: #4a7c59;
            
            /* Typography */
            --font-title: 'PS Fournier', 'Libre Baskerville', serif;
            --font-body: 'Proxima Nova', -apple-system, BlinkMacSystemFont, sans-serif;
            
            /* Spacing */
            --max-width: 580px;
            --border-radius: 12px;
        }
        
        /* ========================================
           GLOBAL STYLES
        ======================================== */
        * {
            margin: 0;
            padding: 20px 0 0 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-body);
            background: var(--background);
            color: var(--text-body);
             /* line-height: 1.6;
            min-height: 100vh */
            display: flex;
            align-items: center;
            justify-content: center;
            /*padding: 30px 20px;*/
            position: relative;
            overflow-x: hidden;
        }
        
        /* Remove decorative background elements */
        body::before,
        body::after {
            display: none;
        }
        
        .form-container {
            background: var(--surface-white);
            border-radius: 20px;
            padding: 30px 30px;
            max-width: var(--max-width);
            width: 100%;
            position: relative;
            z-index: 1;
            border: 1px solid #e0e0e0;
        }
        
        /* Remove decorative corner accent */
        .form-container::before {
            display: none;
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .brand-name {
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 400;
            color: var(--text-body);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .form-title {
            font-family: var(--font-title);
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--text-title);
            margin-bottom: 12px;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        
        .form-subtitle {
            font-size: 16px;
            color: var(--text-body);
            font-weight: 300;
            line-height: 1.5;
        }
        
        /* Remove decorative divider */
        .divider {
            display: none;
        }
        
        .contact-form {
            position: relative;
        }
        
        .form-group {
            margin-bottom: 26px;
            position: relative;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-body);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.2s ease;
        }
        
        .optional-tag {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-body);
            text-transform: lowercase;
            letter-spacing: 0;
        }
        
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            font-family: var(--font-body);
            font-size: 15px;
            color: var(--text-body);
            background: var(--surface-white);
            transition: all 0.3s ease;
            outline: none;
        }
        
        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-body);
            opacity: 0.5;
        }
        
        .form-input:focus,
        .form-textarea:focus {
            border-color: var(--text-title);
            background: var(--surface-white);
        }
        
        .form-input.error,
        .form-textarea.error {
            border-color: var(--error-color);
            animation: shake 0.4s ease;
        }
        
        .form-input.error:focus,
        .form-textarea:focus {
            border-color: var(--text-title);
        }
        
        .form-input.valid,
        .form-textarea.valid {
            border-color: var(--success-color);
        }
        
        .form-textarea {
            min-height: 140px;
            resize: vertical;
            font-family: var(--font-body);
        }
        
        .error-message {
            display: none;
            font-size: 13px;
            color: var(--error-color);
            margin-top: 8px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }
        
        .error-message.show {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .error-message::before {
            content: '⚠';
            font-size: 14px;
        }
        
        .submit-button {
            width: 100%;
            padding: 18px 32px;
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: var(--border-radius);
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .submit-button::before {
            display: none;
        }
        
        .submit-button:hover {
            background: #1a1a1a;
        }
        
        .submit-button:active {
            transform: scale(0.98);
        }
        
        .submit-button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        
        /* Success message */
        .success-message {
            display: none;
            background: var(--surface-white);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            animation: slideDown 0.5s ease;
        }
        
        .success-message.show {
            display: block;
        }
        
        .success-message h3 {
            font-family: var(--font-title);
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text-title);
            margin-bottom: 8px;
        }
        
        .success-message p {
            font-family: var(--font-body);
            font-size: 15px;
            color: var(--text-body);
        }
        
        /* Loading state */
        .submit-button.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }
        
        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive Design */
        @media (max-width: 600px) {
            .form-container {
                padding: 35px 28px;
            }
            
            .form-title {
                font-size: 1.4rem;
            }
            
            .form-subtitle {
                font-size: 14px;
            }
            
            .form-input,
            .form-textarea {
                padding: 13px 16px;
                font-size: 14px;
            }
            
            .submit-button {
                padding: 16px 28px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
     <!--
        <div class="form-header">
            <h1 class="form-title">Get in Touch</h1>
            <div class="divider"></div>
            <p class="form-subtitle">We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
        </div> 
     -->
        
        <form class="contact-form" id="contactForm" novalidate>
            <div class="form-group">
                <label class="form-label" for="name">Name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    class="form-input" 
                    placeholder="Your full name"
                    required
                >
                <span class="error-message" id="nameError">Please enter your name</span>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="your.email@example.com"
                    required
                >
                <span class="error-message" id="emailError">Please enter a valid email address</span>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="phone">
                    Phone
                    <span class="optional-tag">(Optional)</span>
                </label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    class="form-input" 
                    placeholder="+91 98765 43210"
                >
                <span class="error-message" id="phoneError">Please enter a valid phone number</span>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="message">Message</label>
                <textarea 
                    id="message" 
                    name="message" 
                    class="form-textarea" 
                    placeholder="Tell us what's on your mind..."
                    required
                ></textarea>
                <span class="error-message" id="messageError">Please enter a message</span>
            </div>
            
            <button type="submit" class="submit-button" id="submitBtn">Send Message</button>
        </form>
        
        <div class="success-message" id="successMessage">
            <h3>Message Sent!</h3>
            <p>Thank you for contacting us. We'll get back to you shortly.</p>
        </div>
    </div>

    <script>
        // ====================================
        // FORM VALIDATION & SUBMISSION
        // ====================================
        
        const form = document.getElementById('contactForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const messageInput = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        
        // Validation patterns
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phonePattern = /^[\d\s\-\+\(\)]{10,}$/;
        
        // Validate individual field
        function validateField(input, errorId, validationFn) {
            const errorElement = document.getElementById(errorId);
            const isValid = validationFn(input.value);
            
            if (!isValid) {
                input.classList.add('error');
                input.classList.remove('valid');
                errorElement.classList.add('show');
                return false;
            } else {
                input.classList.remove('error');
                input.classList.add('valid');
                errorElement.classList.remove('show');
                return true;
            }
        }
        
        // Real-time validation on blur
        nameInput.addEventListener('blur', () => {
            validateField(nameInput, 'nameError', val => val.trim().length > 0);
        });
        
        emailInput.addEventListener('blur', () => {
            validateField(emailInput, 'emailError', val => emailPattern.test(val));
        });
        
        phoneInput.addEventListener('blur', () => {
            if (phoneInput.value.trim().length > 0) {
                validateField(phoneInput, 'phoneError', val => phonePattern.test(val));
            } else {
                phoneInput.classList.remove('error', 'valid');
                document.getElementById('phoneError').classList.remove('show');
            }
        });
        
        messageInput.addEventListener('blur', () => {
            validateField(messageInput, 'messageError', val => val.trim().length > 0);
        });
        
        // Clear error on input
        [nameInput, emailInput, phoneInput, messageInput].forEach(input => {
            input.addEventListener('input', () => {
                input.classList.remove('error');
                const errorId = input.id + 'Error';
                document.getElementById(errorId).classList.remove('show');
            });
        });
        
        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validate all required fields
            const isNameValid = validateField(nameInput, 'nameError', val => val.trim().length > 0);
            const isEmailValid = validateField(emailInput, 'emailError', val => emailPattern.test(val));
            const isMessageValid = validateField(messageInput, 'messageError', val => val.trim().length > 0);
            
            // Validate phone only if filled
            let isPhoneValid = true;
            if (phoneInput.value.trim().length > 0) {
                isPhoneValid = validateField(phoneInput, 'phoneError', val => phonePattern.test(val));
            }
            
            // If all validations pass, submit form
            if (isNameValid && isEmailValid && isPhoneValid && isMessageValid) {
                // Show loading state
                submitBtn.disabled = true;
                submitBtn.classList.add('loading');
                submitBtn.textContent = 'Sending...';
                
                // Prepare form data
                const formData = {
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    phone: phoneInput.value.trim(),
                    message: messageInput.value.trim(),
                    _to: 'bangaloreblooms2026@gmail.com',
                    _subject: `New Contact Form Submission from ${nameInput.value.trim()}`,
                    _replyto: emailInput.value.trim()
                };
                
                try {
                    // Send to Web3Forms (FREE - unlimited submissions)
                    // Replace 'YOUR_ACCESS_KEY_HERE' with your actual Web3Forms access key
                    // Get free key at: https://web3forms.com/
                    const response = await fetch('https://api.web3forms.com/submit', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            access_key: '67cd102d-ac27-4220-9827-6ea1230544f8', // REPLACE THIS
                            name: formData.name,
                            email: formData.email,
                            phone: formData.phone,
                            message: formData.message,
                            subject: formData._subject
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        // Show success message
                        form.style.display = 'none';
                        successMessage.classList.add('show');
                        
                        // Reset form
                        form.reset();
                        [nameInput, emailInput, phoneInput, messageInput].forEach(input => {
                            input.classList.remove('valid', 'error');
                        });
                    } else {
                        throw new Error('Submission failed');
                    }
                    
                } catch (error) {
                    console.error('Error:', error);
                    alert('Sorry, there was an error sending your message. Please try again or email us directly at bangaloreblooms2026@gmail.com');
                } finally {
                    // Reset button state
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                    submitBtn.textContent = 'Send Message';
                }
            }
        });
    </script>
</body>
</html>
